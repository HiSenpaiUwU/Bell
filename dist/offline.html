<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bell Fresh Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: linear-gradient(180deg, #0b140f, #102820);
        color: #f7fbf7;
        font-family: "Trebuchet MS", sans-serif;
      }

      main {
        width: min(520px, calc(100% - 2rem));
        padding: 2rem;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.08);
        text-align: center;
      }

      h1 {
        margin-bottom: 0.8rem;
        font-family: Georgia, serif;
      }

      p {
        line-height: 1.6;
        color: rgba(247, 251, 247, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bell Fresh is offline</h1>
      <p>Your saved pages and previously loaded content can still open once the app is installed.</p>
    </main>
  </body>
</html>
